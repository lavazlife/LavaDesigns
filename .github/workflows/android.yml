name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        if [ -d "LavaDesigns" ]; then
          cd LavaDesigns && npm install
        else
          npm install
        fi

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        cache-dependency-path: |
          android/build.gradle
          LavaDesigns/android/build.gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -d "LavaDesigns" ]; then
          chmod +x LavaDesigns/android/gradlew
        else
          chmod +x android/gradlew
        fi

    - name: Build Android APK
      run: |
        if [ -d "LavaDesigns" ]; then
          cd LavaDesigns && npm run android:build
        else
          npm run android:build
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          android/app/build/outputs/apk/debug/app-debug.apk
          LavaDesigns/android/app/build/outputs/apk/debug/app-debug.apk
